<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* Thay đổi màu nền thành trắng theo code mới của bạn */
            background-color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .bugcat-gif {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
        }

        .credits {
            font-size: 14px;
            letter-spacing: 2px;
            /* Màu chữ xám để nổi bật trên nền trắng */
            color: #64748b; 
            text-transform: uppercase;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <img src="1.gif" alt="Bugcat Loading" class="bugcat-gif">
    
    <div class="credits">made by @duchieu</div>

    <script>
        // Sau 5 giây sẽ chuyển sang trang chính
        setTimeout(() => {
            window.location.href = "index.html"; 
        }, 5000);
    </script>
</body>
</html>
